<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RISE Consulting.AE | Bilingual Master Consulting Scorecard</title>
<style>
:root{--navy:#0f2741;--navy-2:#17375b;--green:#2f6b1f;--green-2:#4a8a2f;--gold:#c9a43b;--gold-soft:#edd9a0;--bg:#f4f5f2;--card:#ffffff;--line:#d9e0d8;--text:#162433;--muted:#637282;--good:#1f7a46;--med:#b66b14;--bad:#a6382b;--shadow:0 18px 48px rgba(15,39,65,.10);--radius:22px}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;font-family:Inter,Arial,Tahoma,sans-serif;background:linear-gradient(180deg,#eef2f6 0%,#f6f4ef 26%,#f3f5f1 100%);color:var(--text)}
body.rtl{direction:rtl;font-family:"Segoe UI",Tahoma,Arial,sans-serif}
.container{max-width:1280px;margin:0 auto;padding:28px}.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--navy) 0%, #123255 55%, #0d1f33 100%);border-radius:32px;color:#fff;box-shadow:var(--shadow);padding:34px}
.hero:before{content:"";position:absolute;inset:auto -120px -140px auto;width:360px;height:360px;background:radial-gradient(circle,var(--gold-soft) 0%, rgba(201,164,59,.20) 35%, rgba(201,164,59,0) 70%);pointer-events:none}
.hero-grid{display:grid;grid-template-columns:320px 1fr;gap:28px;align-items:center}.logo-box{background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.18);border-radius:28px;padding:22px;min-height:220px;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px rgba(201,164,59,.18)}.logo-box img{width:100%;height:auto;display:block}
.kicker{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);padding:8px 12px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#dce7f4}
.hero h1{font-family:Georgia,"Times New Roman",serif;font-size:clamp(36px,4.8vw,60px);line-height:1.05;margin:14px 0 14px;max-width:860px}.hero .sub{font-size:20px;line-height:1.6;color:#dbe7f4;max-width:920px;margin:0 0 18px}.hero p{font-size:16px;line-height:1.75;color:#d4dfec;max-width:920px;margin:0 0 22px}
.cta-row{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;align-items:center}button,.btn,select{appearance:none;border:none;border-radius:16px;padding:15px 20px;font-weight:800;font-size:15px;cursor:pointer;transition:.22s ease;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,var(--green),var(--green-2));color:#fff;box-shadow:0 12px 24px rgba(47,107,31,.24)}.btn-secondary{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.18)}.btn-primary:hover,.btn-secondary:hover,.ghost:hover,.nav-btn:hover{transform:translateY(-1px)}
.lang-box{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);padding:6px 8px;border-radius:18px;color:#fff}.lang-box select{background:transparent;color:#fff;padding:10px 14px}.lang-box option{color:#162433}
.hero-metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-top:26px}.metric{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:16px}.metric strong{display:block;font-size:26px;color:#fff}.metric span{font-size:13px;color:#d6e2ef;line-height:1.5}
.layout{display:grid;grid-template-columns:340px 1fr;gap:24px;margin-top:24px;align-items:start}.side,.main{background:var(--card);border-radius:28px;border:1px solid var(--line);box-shadow:var(--shadow)}.side{padding:24px;position:sticky;top:18px}.main{padding:28px}
.section-kicker{font-size:12px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--green);margin-bottom:8px}.side h2,.main h2,.main h3{font-family:Georgia,"Times New Roman",serif;color:var(--navy);margin:0 0 12px}.side h2{font-size:29px}.main h2{font-size:34px}.main h3{font-size:24px}.muted{color:var(--muted);line-height:1.75}
.list{display:grid;gap:10px;margin:16px 0 0}.list div{background:#f7faf7;border:1px solid var(--line);padding:13px 14px;border-radius:16px;font-size:14px;color:#24313d}
.progress-box{margin:20px 0 18px}.progress{height:12px;background:#e9eef1;border:1px solid #d9e1e8;border-radius:999px;overflow:hidden}.progress > span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--green-2));border-radius:999px;transition:width .25s ease}.progress-meta{display:flex;justify-content:space-between;margin-top:9px;font-size:13px;color:var(--muted)}
.nav-list{display:grid;gap:10px;margin-top:18px}.nav-btn{width:100%;background:#f6f9fb;border:1px solid var(--line);color:var(--navy);text-align:left;padding:14px 16px;border-radius:16px}body.rtl .nav-btn{text-align:right}
.step{display:none}.step.active{display:block}.question-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px 18px 16px;margin-bottom:14px;box-shadow:0 10px 20px rgba(15,39,65,.03)}.question-head{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}.question-no,.domain-chip{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;border-radius:999px;padding:7px 10px}.question-no{background:#eef6ec;color:var(--green)}.domain-chip{background:#edf2f7;color:var(--navy)}.q-title{font-size:20px;line-height:1.45;color:var(--text);margin-top:10px;font-weight:700}
.dual{display:grid;gap:4px}.dual .ar{font-family:"Segoe UI",Tahoma,Arial,sans-serif}
.options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.option{display:flex;gap:12px;align-items:flex-start;background:#fbfcfd;border:1px solid var(--line);border-radius:16px;padding:14px 14px 13px;cursor:pointer;transition:.18s ease}.option:hover,.option.selected{border-color:rgba(47,107,31,.45);box-shadow:0 0 0 4px rgba(74,138,47,.08)}.option input{margin-top:4px}
.subcard{margin-top:14px;background:#f7faf7;border:1px dashed rgba(47,107,31,.35);border-radius:18px;padding:16px}.subhead{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--green);margin-bottom:8px}
.note-box{margin-top:14px}textarea{width:100%;min-height:92px;resize:vertical;border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff;color:var(--text);font:inherit}input[type=text],input[type=email]{width:100%;border:1px solid var(--line);border-radius:16px;padding:14px 15px;background:#fff;color:var(--text);font:inherit}
.actions{display:flex;justify-content:space-between;gap:12px;margin-top:18px;flex-wrap:wrap}.ghost{background:#fff;border:1px solid var(--line);color:var(--navy)}
.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.result-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.result-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 8px 18px rgba(15,39,65,.04)}.result-card.blur{filter:blur(2px);opacity:.68}
.score-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px}.score{font-size:30px;font-weight:800;color:var(--navy)}.rating{font-size:12px;font-weight:800;padding:7px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.08em}.bad{background:#f6d8d4;color:#8d2e23}.med{background:#f8e8c6;color:#8d5b0b}.good{background:#dcefdc;color:#1f7a46}
.rec-box{margin-top:18px;background:linear-gradient(180deg,#fff,#fbfcf8);border:1px solid var(--line);border-radius:22px;padding:22px}.priority-list{display:grid;gap:10px;margin-top:12px}.priority-item{background:#f7faf7;border:1px solid var(--line);padding:12px 14px;border-radius:14px}
.inline-fields{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
@media (max-width:980px){.hero-grid,.layout,.grid-2,.result-grid,.inline-fields,.options{grid-template-columns:1fr}.side{position:relative;top:auto}.hero-metrics{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style>
</head>

", "ضعيف / غير متسق", "غير موجود / غير واضح"]}, {"id": "q49", "domain": "scale", "title": "Does the business monitor market changes and adapt fast enough?", "options": [{"label": "Strongly true / fully in place", "score": 100}, {"label": "Mostly true / partly structured", "score": 75}, {"label": "Weak / inconsistent", "score": 40}, {"label": "Not in place / unclear", "score": 0}], "sub": {"title": "How quickly can the company translate market insight into practical internal action?", "options": [{"label": "Fully clear and documented", "score": 100}, {"label": "Partly clear but not formalized", "score": 70}, {"label": "Minimal clarity", "score": 30}, {"label": "Not clear at all", "score": 0}], "title_ar": "ما مدى سرعة تحويل فهم السوق إلى إجراءات داخلية عملية؟", "options_ar": ["واضح بالكامل وموثق", "واضح جزئياً لكنه غير مؤسسي", "وضوح محدود", "غير واضح إطلاقاً"]}, "title_ar": "هل تراقب الشركة تغيرات السوق وتتكيّف بالسرعة الكافية؟", "options_ar": ["متحقق بالكامل / مطبق بوضوح", "متحقق إلى حد كبير / منظم جزئياً", "ضعيف / غير متسق", "غير موجود / غير واضح"]}, {"id": "q50", "domain": "scale", "title": "Is there a defined plan for expansion, capability growth, or scale investment?", "options": [{"label": "Strongly true / fully in place", "score": 100}, {"label": "Mostly true / partly structured", "score": 75}, {"label": "Weak / inconsistent", "score": 40}, {"label": "Not in place / unclear", "score": 0}], "sub": {"title": "How clear is the expansion logic in terms of where to grow, why, and with what capacity?", "options": [{"label": "Fully clear and documented", "score": 100}, {"label": "Partly clear but not formalized", "score": 70}, {"label": "Minimal clarity", "score": 30}, {"label": "Not clear at all", "score": 0}], "title_ar": "ما مدى وضوح منطق التوسع من حيث أين ننمو، ولماذا، وبأي قدرة؟", "options_ar": ["واضح بالكامل وموثق", "واضح جزئياً لكنه غير مؤسسي", "وضوح محدود", "غير واضح إطلاقاً"]}, "title_ar": "هل توجد خطة محددة للتوسع أو تنمية القدرات أو استثمار التوسع؟", "options_ar": ["متحقق بالكامل / مطبق بوضوح", "متحقق إلى حد كبير / منظم جزئياً", "ضعيف / غير متسق", "غير موجود / غير واضح"]}];
const partialVisible = ['strategy','operations','marketing','finance'];
const domainOrder = domains.map(d=>d.id);
const domainGroups = domainOrder.map(id => Object.assign({}, domains.find(d=>d.id===id), { questions: questions.filter(q=>q.domain===id) }));
let currentStep = 0; let currentDomainIndex = 0; let language = 'en'; const answers = {}; const lead = {name:'', email:''};
function t(key){ return (strings[language==='ar'?'ar':'en'][key] || strings.en[key] || key); }
function dual(en, ar){ if(language==='ar') return `<div class="dual"><div class="ar">${ar}</div></div>`; if(language==='both') return `<div class="dual"><div>${en}</div><div class="ar">${ar}</div></div>`; return `<div>${en}</div>`; }
function txt(obj, key, keyAr){ return dual(obj[key], obj[keyAr]); }
function labelForOptions(en, ar){ return language==='ar' ? ar : language==='both' ? `${en}<br><span class="ar">${ar}</span>` : en; }
function byId(id){ return document.getElementById(id); }
function setLanguage(lang){ language = lang; document.body.classList.toggle('rtl', lang==='ar'); renderStatic(); renderFirmographics(); renderDomain(); renderPartialResults(); if(currentStep===4) renderFullResults(); updateProgress(); }
function renderStatic(){
  byId('heroKicker').textContent=t('kicker'); byId('heroTitle').innerHTML=dual(strings.en.title, strings.ar.title); byId('heroSub').innerHTML=dual(strings.en.sub, strings.ar.sub); byId('heroBrief').innerHTML=dual(strings.en.brief, strings.ar.brief);
  byId('startBtn').textContent=t('start'); byId('langLabel').textContent=t('lang');
  byId('m1').innerHTML=dual('Executive domains across strategy, control, growth, and scale.','مجالات تنفيذية تغطي الاستراتيجية والرقابة والنمو والتوسع.');
  byId('m2').innerHTML=dual('Core diagnostic questions in the master consulting scorecard.','سؤالاً أساسياً في بطاقة التقييم الاستشارية الرئيسية.');
  byId('m3').innerHTML=dual('Follow-up sub-questions for deeper clarity where needed.','سؤالاً فرعياً لإضافة وضوح أعمق عند الحاجة.');
  byId('m4').innerHTML=dual('Integrated advisory pathway recommendation at the end.','توصية استشارية متكاملة في نهاية التقييم.');
  byId('aboutTitle').textContent=t('about'); byId('whyTitle').textContent=t('how'); byId('aboutCopy').innerHTML=dual(strings.en.about_p, strings.ar.about_p);
  byId('whyList').innerHTML=[1,2,3].map(i=>`<div>${dual(strings.en['why'+i], strings.ar['why'+i])}</div>`).join('');
  byId('nav0').textContent=t('overview'); byId('nav1').textContent=t('profile'); byId('nav2').textContent=t('diagnostic'); byId('nav3').textContent=t('initial'); byId('nav4').textContent=t('full');
  byId('introKicker').textContent=t('overview'); byId('introHead').innerHTML=dual('Master Consulting Scorecard','بطاقة التقييم الاستشاري الرئيسية'); byId('introText').innerHTML=dual('Complete the business profile, move through each domain, and answer the follow-up clarity questions whenever a weaker answer indicates a need for more detail. The final report translates the response pattern into a clearer advisory reading and likely RISE pathway.','أكمل الملف التعريفي، ثم انتقل عبر كل مجال، وأجب عن الأسئلة التوضيحية الإضافية عند الحاجة. يحول التقرير النهائي نمط الإجابات إلى قراءة استشارية أوضح ومسار RISE الأنسب.');
  byId('profileKicker').textContent=t('profile_k'); byId('profileHead').textContent=t('profile_h'); byId('toQuestionsBtn').textContent=t('continue');
  byId('diagKicker').textContent=t('diag_k'); byId('backBtn').textContent=t('back');
  byId('partialKicker').textContent=t('partial_k'); byId('partialHead').textContent=t('partial_h'); byId('partialText').textContent=t('partial_p'); byId('leadName').placeholder=t('name'); byId('leadEmail').placeholder=t('email'); byId('unlockBtn').textContent=t('unlock');
  byId('finalKicker').textContent=t('final_k'); byId('finalHead').textContent=t('final_h');
}
function goToStep(index){ if(index===2 && !firmographicsComplete()){ alert(t('completeProfile')); return; } if(index===2) currentDomainIndex=0; currentStep=index; document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===index)); if(index===1) renderFirmographics(); if(index===2) renderDomain(); if(index===3) renderPartialResults(); if(index===4) renderFullResults(); }
function jumpToQuiz(){ goToStep(1); document.getElementById('profileStep').scrollIntoView({behavior:'smooth'}); }
function answerQuestion(id, val){ answers[id] = Number(val); renderDomain(); updateProgress(); }
function answerSub(id, val){ answers[id+'_sub'] = Number(val); renderDomain(); updateProgress(); }
function saveDomainNote(domainId, val){ answers['note_'+domainId] = val; }
function shouldShowSub(q){ return typeof answers[q.id]==='number' && answers[q.id] < 76; }
function renderFirmographics(){ const wrap=byId('firmographicWrap'); wrap.innerHTML = firmographics.map((f,idx)=>`<div class="question-card"><div class="question-head"><span class="question-no">${t('profileLabel')} ${idx+1}</span></div><div class="q-title">${dual(f.title, f.title_ar)}</div><div class="options" style="margin-top:12px">${f.options.map((opt,i)=>`<label class="option ${answers[f.id]===opt?'selected':''}"><input type="radio" name="${f.id}" value="${opt}" ${answers[f.id]===opt?'checked':''} onchange="answers['${f.id}']=this.value;renderFirmographics();updateProgress()"><span>${labelForOptions(opt, f.options_ar[i])}</span></label>`).join('')}</div></div>`).join(''); }
function renderDomain(){ const group=domainGroups[currentDomainIndex]; byId('domainTitle').innerHTML = dual(`${currentDomainIndex+1}. ${group.name}`, `${currentDomainIndex+1}. ${group.name_ar}`); byId('domainDesc').innerHTML=dual(group.desc, group.desc_ar); byId('nextDomainBtn').textContent=currentDomainIndex===domainGroups.length-1?t('seeInitial'):t('next'); byId('questionsWrap').innerHTML = group.questions.map((q,idx)=>`<div class="question-card"><div class="question-head"><span class="question-no">${t('question')} ${currentDomainIndex*5+idx+1}</span><span class="domain-chip">${language==='ar'?group.name_ar:group.name}</span></div><div class="q-title">${dual(q.title, q.title_ar)}</div><div class="options" style="margin-top:12px">${q.options.map((opt,i)=>`<label class="option ${answers[q.id]===opt.score?'selected':''}"><input type="radio" name="${q.id}" value="${opt.score}" ${answers[q.id]===opt.score?'checked':''} onchange="answerQuestion('${q.id}', this.value)"><span>${labelForOptions(opt.label, q.options_ar[i])}</span></label>`).join('')}</div>${shouldShowSub(q)?`<div class="subcard"><div class="subhead">${t('followup')}</div><div class="q-title" style="font-size:17px">${dual(q.sub.title, q.sub.title_ar)}</div><div class="options" style="margin-top:12px">${q.sub.options.map((opt,i)=>`<label class="option ${answers[q.id+'_sub']===opt.score?'selected':''}"><input type="radio" name="${q.id}_sub" value="${opt.score}" ${answers[q.id+'_sub']===opt.score?'checked':''} onchange="answerSub('${q.id}', this.value)"><span>${labelForOptions(opt.label, q.sub.options_ar[i])}</span></label>`).join('')}</div></div>`:''}${idx===group.questions.length-1?`<div class="note-box"><div class="subhead">${t('sectionNote')}</div><textarea placeholder="${t('notes_ph')}" oninput="saveDomainNote('${group.id}', this.value)">${answers['note_'+group.id]||''}</textarea></div>`:''}</div>`).join(''); }
function firmographicsComplete(){ return firmographics.every(f => answers[f.id]); }
function currentDomainComplete(){ const group=domainGroups[currentDomainIndex]; return group.questions.every(q => typeof answers[q.id]==='number' && (!shouldShowSub(q) || typeof answers[q.id+'_sub']==='number')); }
function backDomain(){ if(currentDomainIndex>0){ currentDomainIndex--; renderDomain(); updateProgress(); } else goToStep(1); }
function nextDomain(){ if(!currentDomainComplete()){ alert(t('completeSection')); return; } if(currentDomainIndex<domainGroups.length-1){ currentDomainIndex++; renderDomain(); updateProgress(); } else goToStep(3); }
function answeredCount(){ let total=0; firmographics.forEach(f=>{if(answers[f.id]) total++;}); questions.forEach(q=>{ if(typeof answers[q.id]==='number') total++; if(shouldShowSub(q) && typeof answers[q.id+'_sub']==='number') total++; }); return total; }
function totalPossibleMax(){ return firmographics.length + questions.length + questions.length; }
function updateProgress(){ const answered=answeredCount(); const max=totalPossibleMax(); const pct=Math.round(answered/max*100); byId('progressFill').style.width=pct+'%'; byId('progressText').textContent=`${pct}% ${t('complete')}`; byId('progressCount').textContent=`${answered} / ${max} ${t('items')}`; }
function getDomainScore(domainId){ const qs=questions.filter(q=>q.domain===domainId); const arr=[]; qs.forEach(q=>{if(typeof answers[q.id]==='number') arr.push(answers[q.id]); if(shouldShowSub(q) && typeof answers[q.id+'_sub']==='number') arr.push(answers[q.id+'_sub']);}); return arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):0; }
function getOverallScore(){ const arr=domains.map(d=>getDomainScore(d.id)); return Math.round(arr.reduce((a,b)=>a+b,0)/arr.length); }
function scoreClass(score){ if(score<40) return 'bad'; if(score<80) return 'med'; return 'good'; }
function ratingLabel(score){ if(language==='ar'){ if(score<40) return 'حرج'; if(score<60) return 'ضعيف'; if(score<80) return 'متوسط'; return 'قوي'; } if(score<40) return 'Critical'; if(score<60) return 'Weak'; if(score<80) return 'Moderate'; return 'Strong'; }
function lowestDomains(n){ return domains.map(d=>Object.assign({},d,{score:getDomainScore(d.id)})).sort((a,b)=>a.score-b.score).slice(0,n||3); }
function profile(){ const years=answers.fg4||''; const founder=answers.fg5||''; const employees=answers.fg3||''; const revenue=answers.fg2||''; const overall=getOverallScore(); const isCorporate=employees==='300+' || (answers.fg1||'').includes('Corporate') || (answers.fg1||'').includes('Department'); if(isCorporate) return language==='ar'?'الوحدات / الإدارات المؤسسية':'Corporate Units / Departments'; if(years==='Under 2 years') return language==='ar'?'الشركات الناشئة (0–2 سنة)':'Startups (0–2 Years)'; if(overall<50 || (founder==='Yes' && (employees==='1–10' || employees==='11–30'))) return language==='ar'?'الشركات الصغيرة والمتوسطة – عوائق داخلية':'SMEs – Internal Barriers'; if(overall<68 || revenue==='AED 1M – 5M' || revenue==='AED 5M – 20M') return language==='ar'?'الشركات الصغيرة والمتوسطة – مرحلة الثبات':'SMEs – Growth Plateau'; return language==='ar'?'الشركات الصغيرة والمتوسطة – جاهزة للتوسع':'SMEs – Expansion Ready'; }
function packageRecommendation(segment){ const ar = language==='ar'; if(segment.includes('Startups')||segment.includes('الناشئة')) return {name: ar?'مسار RISE التأسيسي / مسار الوضوح':'RISE Foundation / Clarity Path', objective: ar?'تثبيت الاتجاه ووضوح الأدوار والأساس التشغيلي.':'Stabilize direction, role clarity, and operating basics.', focus: ar?['وضوح الاستراتيجية','الهيكل الأساسي','النظام التشغيلي الأساسي','فصل دور المؤسس']:['Strategy clarity','Basic structure','Core operating system','Founder role separation']}; if(segment.includes('Internal')||segment.includes('عوائق')) return {name: ar?'RISE الأداء / سباق السيطرة':'RISE Performance / Control Sprint', objective: ar?'معالجة الكفاءة الداخلية، وتشديد الرقابة، واستعادة إيقاع التنفيذ.':'Fix internal inefficiencies, tighten control, and restore execution rhythm.', focus: ar?['إعادة تصميم العمليات','هيكل المساءلة','انضباط عملية المبيعات','حوكمة مؤشرات الأداء']:['Operations redesign','Accountability structure','Sales process discipline','KPI governance']}; if(segment.includes('Plateau')||segment.includes('الثبات')) return {name: ar?'مسار RISE لتنشيط النمو':'RISE Growth Activation Path', objective: ar?'كسر حالة الركود وتحسين بنية النمو وتنويع زخم الإيرادات.':'Break stagnation, improve growth architecture, and diversify revenue momentum.', focus: ar?['استراتيجية النمو','تنشيط تطوير الأعمال','مواءمة التسويق','دورة مراجعة الأداء']:['Growth strategy','Business development activation','Marketing alignment','Performance review cycle']}; if(segment.includes('Corporate')||segment.includes('المؤسسية')) return {name: ar?'برنامج RISE لأداء الإدارات':'RISE Department Performance Program', objective: ar?'رفع المخرجات القابلة للقياس واتساق العمليات والمساءلة داخل الوحدة.':'Increase measurable output, process consistency, and accountability within the unit.', focus: ar?['مؤشرات أداء الإدارة','إعادة تصميم سير العمل','وضوح التعاون بين الإدارات','مواءمة القيادة']:['Department KPIs','Workflow redesign','Cross-functional clarity','Leadership alignment']}; return {name: ar?'برنامج RISE لهندسة التوسع':'RISE Scale Architecture Program', objective: ar?'تهيئة النشاط للتوسع المنضبط والنمو القابل للتوسع.':'Prepare the business for controlled expansion and scalable growth.', focus: ar?['خارطة طريق التوسع','تصميم الطبقة القيادية','أنظمة القابلية للتوسع','حوكمة متقدمة']:['Expansion roadmap','Leadership layer design','Scalability systems','Advanced governance']}; }
function buildResultCard(d, locked){ const score=getDomainScore(d.id); const dname=language==='ar'?d.name_ar:d.name; const ddesc=language==='ar'?d.desc_ar:d.desc; return `<div class="result-card ${locked?'blur':''}"><h4>${dname}</h4><p class="muted">${ddesc}</p><div class="score-row"><div class="score">${score}%</div><div class="rating ${scoreClass(score)}">${ratingLabel(score)}</div></div>${locked?`<p class="muted" style="margin-top:12px">${t('locked')}</p>`:''}</div>`; }
function renderPartialResults(){ byId('partialResults').innerHTML = domains.map(d=>buildResultCard(d,!partialVisible.includes(d.id))).join(''); }
function unlockResults(){ const name=byId('leadName').value.trim(); const email=byId('leadEmail').value.trim(); if(!name || !email){ alert(t('leadReq')); return; } lead.name=name; lead.email=email; goToStep(4); }
function renderFullResults(){ const overall=getOverallScore(); const segment=profile(); const pkg=packageRecommendation(segment); byId('finalIntro').innerHTML = language==='ar' ? `${lead.name?lead.name+'، ':''}${t('introPrefix')} ${overall}% ${t('introMiddle')} ${ratingLabel(overall)} ${t('introSuffix')} ${segment}.` : `${lead.name?lead.name+', ':''}${t('introPrefix')} ${overall}% ${t('introMiddle')} ${ratingLabel(overall).toLowerCase()} ${t('introSuffix')} ${segment}.`; byId('fullResults').innerHTML = domains.map(d=>buildResultCard(d,false)).join(''); const low=lowestDomains(3); byId('recommendationBox').innerHTML = `<h3>${t('recommended')}: ${pkg.name}</h3><p>${pkg.objective}</p><p><strong>${t('segLabel')}:</strong> ${segment}<br><strong>${t('scoreLabel')}:</strong> ${overall}% · ${ratingLabel(overall)} ${t('readiness')}</p><div class="priority-list">${low.map((d,i)=>`<div class="priority-item"><strong>${t('priority')} ${i+1}:</strong> ${language==='ar'?d.name_ar:d.name} — ${d.score}%</div>`).join('')}</div><ul>${pkg.focus.map(item=>`<li>${item}</li>`).join('')}</ul>`; }
renderStatic(); renderFirmographics(); renderDomain(); updateProgress();
</script>
