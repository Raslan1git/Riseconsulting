<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RISE Consulting.AE | Business Scaling Scorecard</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1B4D3E;
            --primary-dark: #0F3328;
            --primary-light: #2C6B54;
            --gold: #C5A059;
            --gold-light: #D8BC8C;
            --gold-dark: #A88444;
            --gray-900: #1A1F2C;
            --gray-800: #2D3340;
            --gray-700: #4A5162;
            --gray-600: #6B7385;
            --gray-400: #B4BDCC;
            --gray-200: #E8ECF2;
            --gray-100: #F5F7FA;
            --white: #FFFFFF;
            --success: #2C6B54;
            --warning: #C5A059;
            --danger: #B23B3B;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background: linear-gradient(135deg, #FFFFFF, var(--gray-100));
            color: var(--gray-800);
            line-height: 1.6;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* ===== YOUR EXACT LOGO ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 3px solid var(--gold);
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            display: flex;
            flex-direction: column;
        }

        .logo-rise {
            font-family: var(--font-serif);
            font-size: 56px;
            font-weight: 800;
            line-height: 0.9;
            color: var(--primary);
            letter-spacing: 2px;
        }

        .logo-rise span {
            color: var(--gold);
            font-size: 68px;
        }

        .logo-consulting {
            font-family: var(--font-sans);
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 6px;
            color: var(--gray-600);
            margin-top: 5px;
            text-transform: uppercase;
        }

        .logo-consulting span {
            color: var(--gold);
            font-weight: 700;
        }

        .tagline {
            text-align: right;
        }

        .tagline-main {
            font-family: var(--font-serif);
            font-size: 24px;
            color: var(--primary);
        }

        .tagline-main span {
            color: var(--gold);
            font-weight: 700;
        }

        .tagline-sub {
            font-size: 14px;
            color: var(--gray-600);
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* ===== PROGRESS ===== */
        .progress-container {
            background: var(--white);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border: 1px solid var(--gray-200);
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: var(--gray-700);
            font-weight: 500;
        }

        .progress-bar {
            height: 10px;
            background: var(--gray-200);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--gold));
            width: 0%;
            transition: width 0.3s;
            border-radius: 10px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .step-dot {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--white);
            border: 2px solid var(--gray-400);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--gray-700);
            cursor: pointer;
            transition: all 0.3s;
        }

        .step-dot.active {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--white);
            transform: scale(1.1);
        }

        .step-dot.completed {
            background: var(--primary-light);
            border-color: var(--primary-light);
            color: var(--white);
        }

        .step-dot.completed::after {
            content: '✓';
            font-size: 24px;
        }

        .step-dot.completed span {
            display: none;
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--white);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 1px solid var(--gray-200);
            margin-bottom: 30px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--gold-light);
        }

        .card-icon {
            width: 60px;
            height: 60px;
            background: var(--gray-100);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 28px;
        }

        .card-title {
            font-family: var(--font-serif);
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }

        .card-subtitle {
            color: var(--gray-600);
            margin-top: 5px;
        }

        /* ===== FORMS ===== */
        .form-group {
            margin-bottom: 30px;
        }

        .form-label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--gray-800);
            font-size: 16px;
        }

        .form-input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--gray-100);
            padding: 20px;
            border-radius: 16px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            background: var(--white);
            border-radius: 12px;
            border: 1px solid var(--gray-200);
            cursor: pointer;
            transition: all 0.2s;
        }

        .radio-option:hover {
            border-color: var(--primary);
            background: #F0F7F4;
        }

        .radio-option input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
        }

        /* ===== RATING SCALE ===== */
        .rating-scale {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .rating-option {
            flex: 1;
            min-width: 70px;
        }

        .rating-option input {
            display: none;
        }

        .rating-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 5px;
            background: var(--white);
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .rating-option label span.value {
            font-weight: 700;
            font-size: 24px;
            color: var(--gray-800);
            margin-bottom: 5px;
        }

        .rating-option label span.label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--gray-600);
        }

        .rating-option input:checked + label {
            background: var(--primary);
            border-color: var(--primary);
        }

        .rating-option input:checked + label span.value,
        .rating-option input:checked + label span.label {
            color: var(--white);
        }

        .questions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .question-item {
            background: var(--gray-100);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--gray-200);
        }

        .question-text {
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 15px;
            font-size: 15px;
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 16px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(27, 77, 62, 0.3);
        }

        .btn-gold {
            background: var(--gold);
            color: var(--white);
        }

        .btn-gold:hover {
            background: var(--gold-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--white);
            color: var(--gray-700);
            border: 2px solid var(--gray-200);
        }

        .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-large {
            padding: 18px 50px;
            font-size: 18px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            gap: 15px;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 24px;
            padding: 60px;
            color: var(--white);
            margin-bottom: 40px;
        }

        .hero h1 {
            font-family: var(--font-serif);
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero h1 span {
            color: var(--gold);
        }

        .hero p {
            font-size: 18px;
            max-width: 600px;
            opacity: 0.95;
            margin-bottom: 30px;
        }

        .badge-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .badge {
            background: rgba(255,255,255,0.1);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 15px;
        }

        .badge i {
            color: var(--gold);
            margin-right: 8px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin: 60px 0;
        }

        .feature {
            text-align: center;
            padding: 30px;
        }

        .feature i {
            font-size: 40px;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .feature h3 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 22px;
        }

        /* ===== REPORT ===== */
        .report {
            background: var(--white);
            border-radius: 32px;
            overflow: hidden;
        }

        .report-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            padding: 50px;
            text-align: center;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            margin: 30px auto;
            position: relative;
        }

        .score-circle svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .score-circle-bg {
            stroke: rgba(255,255,255,0.2);
            stroke-width: 8;
            fill: none;
        }

        .score-circle-fill {
            stroke: var(--gold);
            stroke-width: 8;
            fill: none;
            stroke-linecap: round;
        }

        .score-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .score-number {
            font-size: 48px;
            font-weight: 800;
        }

        .pillar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .pillar-card {
            background: var(--gray-100);
            border-radius: 16px;
            padding: 25px;
        }

        .pillar-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .pillar-name {
            font-weight: 700;
            color: var(--primary);
        }

        .pillar-score {
            font-weight: 800;
            font-size: 28px;
            color: var(--primary);
        }

        .pillar-bar {
            height: 10px;
            background: var(--gray-200);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .pillar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--gold));
            border-radius: 10px;
        }

        .footer {
            text-align: center;
            padding: 40px 0;
            margin-top: 40px;
            border-top: 1px solid var(--gray-200);
            color: var(--gray-600);
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            .tagline {
                text-align: center;
            }
            .questions-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <!-- YOUR EXACT LOGO: RISE over CONSULTING.AE -->
            <div class="header">
                <div class="logo">
                    <div class="logo-rise">RISE<span>.</span></div>
                    <div class="logo-consulting">CONSULTING<span>.AE</span></div>
                </div>
                <div class="tagline">
                    <div class="tagline-main">Business Challenges? <span>Solved. Stabilized. Scaled.</span></div>
                    <div class="tagline-sub">Dubai • Abu Dhabi • Riyadh • Global</div>
                </div>
            </div>

            <!-- PROGRESS (shown during assessment) -->
            <template v-if="currentStep > 1 && currentStep < 14">
                <div class="progress-container">
                    <div class="progress-stats">
                        <span><i class="fas fa-flag-checkered" style="color: var(--gold);"></i> Step {{ currentStep-1 }} of 12</span>
                        <span><i class="fas fa-chart-pie" style="color: var(--primary);"></i> {{ Math.round(((currentStep-1)/12)*100) }}% Complete</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" :style="{ width: ((currentStep-1)/12)*100 + '%' }"></div>
                    </div>
                </div>

                <div class="step-indicator">
                    <div v-for="n in 12" :key="n" 
                         class="step-dot" 
                         :class="{ active: (currentStep-1) === n, completed: (currentStep-1) > n }"
                         @click="jumpToStep(n+1)">
                        <span>{{ n }}</span>
                    </div>
                </div>
            </template>

            <!-- DYNAMIC COMPONENT -->
            <component :is="currentComponent" 
                       :answers="answers"
                       @update-answer="updateAnswer"
                       @next-step="nextStep"
                       @prev-step="prevStep"
                       @start="startAssessment">
            </component>

            <!-- FOOTER -->
            <div class="footer">
                <div class="logo-rise" style="font-size: 32px; margin-bottom: 10px;">RISE<span>.</span></div>
                <div class="logo-consulting" style="font-size: 16px;">CONSULTING<span>.AE</span></div>
                <div style="margin-top: 20px; font-size: 14px;">© 2026 RISE Consulting.AE. All rights reserved.</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>
    <script>
        // Step 1: Welcome/Hero
        const StepWelcome = {
            template: `
                <div>
                    <div class="hero">
                        <h1>Is Your Business <span>Ready to Scale?</span></h1>
                        <p>You've built something meaningful. But now you're stuck. Founder dependency, broken processes, stalled growth. We've helped 200+ companies escape the chaos.</p>
                        <div class="badge-container">
                            <span class="badge"><i class="fas fa-rocket"></i> Startups</span>
                            <span class="badge"><i class="fas fa-chart-line"></i> Stuck SMEs</span>
                            <span class="badge"><i class="fas fa-mountain"></i> Plateaued</span>
                            <span class="badge"><i class="fas fa-globe"></i> Expansion Ready</span>
                        </div>
                        <button class="btn btn-gold btn-large" @click="$emit('start')">
                            <i class="fas fa-play"></i> Start Free Assessment
                        </button>
                    </div>

                    <div class="features">
                        <div class="feature">
                            <i class="fas fa-bullseye"></i>
                            <h3>Strategic Clarity</h3>
                            <p>Clear direction, positioning, and growth priorities</p>
                        </div>
                        <div class="feature">
                            <i class="fas fa-users-cog"></i>
                            <h3>Leadership Alignment</h3>
                            <p>Defined roles, accountability, decision-making</p>
                        </div>
                        <div class="feature">
                            <i class="fas fa-cogs"></i>
                            <h3>Operational Excellence</h3>
                            <p>Documented processes, consistent execution</p>
                        </div>
                        <div class="feature">
                            <i class="fas fa-chart-line"></i>
                            <h3>Financial Visibility</h3>
                            <p>Clear margins, cash flow, profitability</p>
                        </div>
                    </div>
                </div>
            `
        };

        // Step 2: Client Info
        const StepClientInfo = {
            template: `
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon"><i class="fas fa-building"></i></div>
                        <div>
                            <div class="card-title">Your Information</div>
                            <div class="card-subtitle">Confidential - used only for your report</div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Company Name</label>
                        <input class="form-input" v-model="company" placeholder="e.g., Acme Corporation">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Your Name</label>
                        <input class="form-input" v-model="name" placeholder="e.g., Jane Smith">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input class="form-input" v-model="email" placeholder="jane@acme.com" type="email">
                    </div>
                    
                    <div class="nav-buttons">
                        <button class="btn btn-secondary" @click="$emit('prev-step')">Back</button>
                        <button class="btn btn-primary" @click="next" :disabled="!isValid">Continue</button>
                    </div>
                </div>
            `,
            data() {
                return { company: '', name: '', email: '' };
            },
            computed: {
                isValid() {
                    return this.company && this.name && this.email && this.email.includes('@');
                }
            },
            methods: {
                next() {
                    this.$emit('update-answer', { id: 'company', value: this.company });
                    this.$emit('update-answer', { id: 'name', value: this.name });
                    this.$emit('update-answer', { id: 'email', value: this.email });
                    this.$emit('next-step');
                }
            }
        };

        // Generic Pillar Step (simplified for demo - full 106 questions would go here)
        const PillarStep = {
            props: ['pillarName', 'pillarIcon'],
            template: `
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon"><i :class="['fas', pillarIcon]"></i></div>
                        <div>
                            <div class="card-title">{{ pillarName }}</div>
                            <div class="card-subtitle">Rate each statement from 1-5</div>
                        </div>
                    </div>
                    
                    <div v-for="n in 5" :key="n" class="question-item">
                        <div class="question-text">Example question {{ n }} for {{ pillarName }}</div>
                        <div class="rating-scale">
                            <div v-for="rating in 5" :key="rating" class="rating-option">
                                <input type="radio" :id="'q'+n+'_'+rating" :name="'q'+n" :value="rating" v-model="ratings['q'+n]">
                                <label :for="'q'+n+'_'+rating">
                                    <span class="value">{{ rating }}</span>
                                    <span class="label">{{ ['Not','Weak','Basic','Strong','Best'][rating-1] }}</span>
                                </label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="nav-buttons">
                        <button class="btn btn-secondary" @click="$emit('prev-step')">Back</button>
                        <button class="btn btn-primary" @click="next">Continue</button>
                    </div>
                </div>
            `,
            data() {
                return { ratings: {} };
            },
            methods: {
                next() {
                    this.$emit('next-step');
                }
            }
        };

        // Review Step
        const StepReview = {
            template: `
                <div class="card">
                    <div class="card-header">
                        <div class="card-icon"><i class="fas fa-check-circle"></i></div>
                        <div>
                            <div class="card-title">Review & Submit</div>
                            <div class="card-subtitle">Ready to generate your strategic report</div>
                        </div>
                    </div>
                    
                    <div style="text-align: center; padding: 40px;">
                        <i class="fas fa-clipboard-check" style="font-size: 80px; color: var(--primary); margin-bottom: 20px;"></i>
                        <h3 style="margin-bottom: 20px;">You've completed all sections</h3>
                        <p style="color: var(--gray-600); margin-bottom: 30px;">Click below to generate your personalized strategic report with risk analysis and recommendations.</p>
                        <button class="btn btn-gold btn-large" @click="generate">
                            <i class="fas fa-file-pdf"></i> Generate Report
                        </button>
                    </div>
                    
                    <div class="nav-buttons">
                        <button class="btn btn-secondary" @click="$emit('prev-step')">Back</button>
                    </div>
                </div>
            `,
            methods: {
                generate() {
                    this.$emit('complete');
                }
            }
        };

        // Report Step
        const StepReport = {
            template: `
                <div class="report">
                    <div class="report-header">
                        <div class="logo-rise" style="font-size: 48px; color: white; margin-bottom: 10px;">RISE<span style="color: var(--gold);">.</span></div>
                        <div class="logo-consulting" style="color: rgba(255,255,255,0.8); letter-spacing: 4px;">CONSULTING<span style="color: var(--gold);">.AE</span></div>
                        <div style="margin: 20px 0 10px; padding: 8px 30px; background: var(--gold); display: inline-block; border-radius: 50px; color: var(--primary); font-weight: 700;">Business Scaling Scorecard</div>
                        
                        <div class="score-circle">
                            <svg viewBox="0 0 100 100">
                                <circle class="score-circle-bg" cx="50" cy="50" r="45"></circle>
                                <circle class="score-circle-fill" cx="50" cy="50" r="45" 
                                        stroke-dasharray="283" 
                                        stroke-dashoffset="113.2"></circle>
                            </svg>
                            <div class="score-text">
                                <div class="score-number">68</div>
                                <div style="font-size: 14px;">out of 100</div>
                            </div>
                        </div>
                        
                        <div style="font-size: 24px; font-weight: 700; margin: 10px 0;">Structured & Progressing</div>
                        <div style="opacity: 0.9;">Good foundation. Ready for optimization.</div>
                    </div>
                    
                    <div class="pillar-grid">
                        <div v-for="p in pillars" :key="p.name" class="pillar-card">
                            <div class="pillar-header">
                                <span class="pillar-name">{{ p.name }}</span>
                                <span class="pillar-score">{{ p.score }}</span>
                            </div>
                            <div class="pillar-bar">
                                <div class="pillar-fill" :style="{ width: (p.score/5)*100 + '%' }"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="padding: 30px 40px;">
                        <h3 style="color: var(--primary); margin-bottom: 20px;">Key Recommendations</h3>
                        <div style="background: var(--gray-100); padding: 25px; border-radius: 16px; margin-bottom: 20px;">
                            <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 15px;">
                                <span style="background: var(--danger); color: white; padding: 5px 15px; border-radius: 50px; font-size: 12px;">HIGH PRIORITY</span>
                                <strong>Founder Dependency Risk</strong>
                            </div>
                            <p style="color: var(--gray-700);">Implement decision rights matrix and leadership development program.</p>
                        </div>
                    </div>
                    
                    <div style="padding: 30px 40px; background: var(--gold-light);">
                        <h3 style="color: var(--primary); margin-bottom: 20px;">Recommended Engagement</h3>
                        <div style="background: white; padding: 30px; border-radius: 16px; text-align: center;">
                            <div style="background: var(--primary); color: white; padding: 10px 30px; border-radius: 50px; display: inline-block; margin-bottom: 20px;">Level 2: Performance</div>
                            <p style="font-size: 18px; margin-bottom: 20px;">Optimize efficiency, margins, and internal systems.</p>
                            <button class="btn btn-gold" @click="schedule">Schedule Consultation</button>
                        </div>
                    </div>
                    
                    <div class="nav-buttons" style="padding: 30px;">
                        <button class="btn btn-secondary" @click="$emit('restart')">Start New Assessment</button>
                        <button class="btn btn-primary" @click="downloadPDF">Download PDF</button>
                    </div>
                </div>
            `,
            data() {
                return {
                    pillars: [
                        { name: 'Strategic Clarity', score: 3.8 },
                        { name: 'Leadership', score: 2.9 },
                        { name: 'Operations', score: 2.4 },
                        { name: 'Finance', score: 3.2 },
                        { name: 'Customer Experience', score: 3.5 },
                        { name: 'Brand', score: 4.1 },
                        { name: 'Team', score: 3.0 },
                        { name: 'Growth', score: 3.3 }
                    ]
                };
            },
            methods: {
                schedule() {
                    alert('Consultation scheduling would open here');
                },
                downloadPDF() {
                    alert('PDF download would start here');
                }
            }
        };

        // Main Vue App
        new Vue({
            el: '#app',
            data: {
                currentStep: 1,
                answers: {}
            },
            computed: {
                currentComponent() {
                    const steps = [
                        StepWelcome,
                        StepClientInfo,
                        { extends: PillarStep, data: () => ({ pillarName: 'Strategic Clarity', pillarIcon: 'fa-bullseye' }) },
                        { extends: PillarStep, data: () => ({ pillarName: 'Leadership & Governance', pillarIcon: 'fa-users-cog' }) },
                        { extends: PillarStep, data: () => ({ pillarName: 'Operations & Process', pillarIcon: 'fa-cogs' }) },
                        { extends: PillarStep, data: () => ({ pillarName: 'Financial Visibility', pillarIcon: 'fa-chart-line' }) },
                        { extends: PillarStep, data: () => ({ pillarName: 'Customer Experience', pillarIcon: 'fa-heart' }) },
                        { extends: PillarStep, data: () => ({ pillarName: 'Brand & Market', pillarIcon: 'fa-tag' }) },
                        { extends: PillarStep, data: () => ({ pillarName: 'Team & Capability', pillarIcon: 'fa-user-friends' }) },
                        { extends: PillarStep, data: () => ({ pillarName: 'Growth Readiness', pillarIcon: 'fa-rocket' }) },
                        StepReview,
                        StepReport
                    ];
                    return steps[this.currentStep - 1] || StepWelcome;
                }
            },
            methods: {
                startAssessment() {
                    this.currentStep = 2;
                },
                updateAnswer(payload) {
                    this.$set(this.answers, payload.id, payload.value);
                },
                nextStep() {
                    if (this.currentStep < 13) {
                        this.currentStep++;
                        window.scrollTo(0, 0);
                    }
                },
                prevStep() {
                    if (this.currentStep > 1) {
                        this.currentStep--;
                        window.scrollTo(0, 0);
                    }
                },
                jumpToStep(step) {
                    if (step <= this.currentStep) {
                        this.currentStep = step;
                        window.scrollTo(0, 0);
                    }
                },
                completeAssessment() {
                    this.currentStep = 13;
                },
                restart() {
                    this.currentStep = 1;
                    this.answers = {};
                }
            }
        });
    </script>
</body>
</html>
